<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Developer Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 mb-4">Hello Midnight Coders!</h1>
            <p class="lead mb-4">Welcome to my developer portfolio. Explore my projects and skills.</p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/blogs}" class="btn btn-primary btn-lg">Explore Blogs</a>
            </div>
        </div>

        <!-- Bio Section -->
        <div th:if="${profile != null}" class="mb-5 py-4">
            <div class="d-flex justify-content-center align-items-center mb-4 gap-3">
                <h2 class="display-5 text-center mb-0">About Me</h2>
                <button sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-secondary" id="edit-bio-btn">
                    Edit Bio
                </button>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <p th:if="${profile.bio != null}" th:text="${profile.bio}" class="lead text-center" style="white-space: pre-wrap;"></p>
                    <p th:if="${profile.bio == null}" class="lead text-center text-muted">No bio available.</p>
                </div>
            </div>
        </div>

        <!-- Featured Projects Section -->
        <div class="mb-5 py-4">
            <h2 class="display-5 text-center mb-4">My Projects</h2>
            <div th:if="${#lists.isEmpty(projects)}" class="text-center">
                <p>No projects found.</p>
            </div>
            <div th:unless="${#lists.isEmpty(projects)}" class="row row-cols-1 row-cols-md-3 g-4">
                <div th:each="project : ${projects}" class="col">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 th:text="${project.name}" class="card-title">Project Name</h5>
                            <p th:text="${#strings.abbreviate(project.synopsis, 128)}" class="card-text">Synopsis</p>
                        </div>
                        <div class="card-footer bg-transparent border-top-0">
                            <a th:href="${project.repositoryUrl}" class="btn btn-outline-primary" target="_blank">View Repository</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center mt-5">
                <a th:href="@{/projects}" class="btn btn-secondary">View More Projects</a>
            </div>
        </div>
    </div>

    <!-- Edit Bio Modal -->
    <div sec:authorize="hasRole('ADMIN')" id="bio-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1050; align-items: center; justify-content: center;">
        <div class="modal-dialog w-100" style="max-width: 600px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Bio</h5>
                    <button type="button" class="btn-close close-bio-modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="bio-form">
                        <input type="hidden" id="profile-id" th:value="${profile.getId()}">
                        <div class="mb-3">
                            <label for="bio-input" class="form-label">Bio (max 2048 characters)</label>
                            <textarea id="bio-input" class="form-control" rows="10" maxlength="2048" th:text="${profile.bio}" required></textarea>
                        </div>
                        <div class="modal-footer border-top-0 px-0 pb-0">
                            <button type="button" class="btn btn-outline-secondary close-bio-modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/profile.js}"></script>
</body>
</html>
