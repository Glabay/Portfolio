<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <h1 th:text="${post.title}" class="display-4 text-center mb-4">Blog Name Here</h1>

        <div class="row justify-content-center mb-5">
            <div class="col-lg-8">
                <p th:text="${post.content}" class="lead text-center">Blog Description Here</p>
            </div>
        </div>

        <div th:unless="${#authorization.expression('isAuthenticated()')}" class="d-flex flex-column gap-3 mb-5">
            <p class="text-muted">You must be logged in to create a comment.</p>
        </div>
        <div th:if="${#authorization.expression('isAuthenticated()')}">
            <button class="btn btn-success mb-4" id="add-comment-btn">
                Create A Comment
            </button>
        </div>

        <p th:if="${#lists.isEmpty(post.getComments())}" class="text-muted">No comments yet... Be the first.</p>
        <div th:unless="${#lists.isEmpty(post.getComments())}" class="d-flex flex-column gap-3 mb-5">
            <div th:each="comment : ${post.getComments()}" class="card shadow-sm">
                <div th:text="${comment.getProfile().getUser().getUsername()}" class="card-header bg-light fw-bold"></div>
                <div class="card-body">
                    <p th:text="${comment.content}" class="card-text mb-0"></p>
                </div>
            </div>
        </div>

        <!-- Create Comment Modal -->
        <div id="comment-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1050; align-items: center; justify-content: center;">
            <input type="hidden" id="user-id" th:value="${userId}">
            <input type="hidden" id="post-id" th:value="${post.getId()}">
            <div class="modal-dialog w-100" style="max-width: 500px;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Create Your Comment</h5>
                        <button type="button" class="btn-close close-modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="comment-form">
                            <div class="mb-3">
                                <label for="comment-content" class="form-label">Comment:</label>
                                <textarea id="comment-content" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="modal-footer border-top-0 px-0 pb-0">
                                <button type="button" class="btn btn-outline-secondary close-modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">Add Comment</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

<script th:src="@{/js/comment.js}"></script>
</body>
</html>
