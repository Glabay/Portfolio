<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
<!-- Reuse the Header Fragment on EVERY page -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- If this user is the Owner, have an Add button -->
<div class="d-flex justify-content-center mb-5 mt-5">
    <button th:if="${isOwner}" class="btn btn-success mb-4" id="add-project-btn">
        Add A Project
    </button>
</div>
<!-- Create Project Modal -->
<div th:if="${isOwner}" id="project-modal" class="modal"
     style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1050; align-items: center; justify-content: center;">
    <div class="modal-dialog w-100" style="max-width: 500px;">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Project</h5>
                <button type="button" class="btn-close close-modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="project-form">
                    <div class="mb-3">
                        <label for="project-name" class="form-label">Project Name</label>
                        <input type="text" id="project-name" class="form-control" placeholder="Project Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="project-repo-url" class="form-label">Repository URL</label>
                        <input type="url" id="project-repo-url" class="form-control"
                               placeholder="https://github.com/..." required>
                    </div>
                    <div class="mb-3">
                        <label for="project-synopsis" class="form-label">Synopsis</label>
                        <textarea id="project-synopsis" class="form-control" placeholder="Brief synopsis of the project"
                                  required></textarea>
                    </div>
                    <div class="modal-footer border-top-0 px-0 pb-0">
                        <button type="button" class="btn btn-outline-secondary close-modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="container py-5">
    <h1 class="display-4 text-center mb-5">My Projects</h1>
    <p th:if="${#lists.isEmpty(projects)}" class="text-center">No projects were found.</p>

    <div th:unless="${#lists.isEmpty(projects)}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div th:each="project : ${projects}" class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 th:text="${project.name}" class="card-title">Project Name</h5>
                    <p th:text="${#strings.abbreviate(project.synopsis, 128)}" class="card-text">Synopsis</p>
                </div>
                <div class="card-footer bg-transparent border-top-0 d-flex justify-content-between align-items-center">
                    <a th:href="${project.repositoryUrl}" class="btn btn-outline-primary" target="_blank">View
                        Repository</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/project.js}"></script>
</body>
</html>
