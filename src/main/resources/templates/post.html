<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/blog.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="list-container">
        <h1 th:text="${post.title}" class="page-title">Blog Name Here</h1>

        <p th:text="${post.content}" class="card-details">Blog Description Here</p>


        <button th:if="${#authentication.isAuthenticated()}" class="add-btn" id="add-comment-btn">
            Create A Comment
        </button>

        <p th:if="${#lists.isEmpty(post.getComments())}">No comments yet... Be the first.</p>
        <div th:unless="${#lists.isEmpty(post.getComments())}" class="comment-stack">
            <div th:each="comment : ${post.getComments()}" class="comment-card">
                <div th:text="${comment.getProfile().getUser().getUsername()}" class="card-author"></div>
                <div th:text="${comment.content}" class="card-details"></div>
            </div>
        </div>

        <!-- Create Comment Modal -->
        <div id="comment-modal" class="modal">
            <input type="hidden" id="user-id" th:value="${userId}">
            <input type="hidden" id="post-id" th:value="${post.getId()}">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Your Comment</h2>
                </div>
                <form id="comment-form">
                    <div class="form-group">
                        <label for="comment-content">Comment:</label>
                        <input type="text" id="comment-content" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline close-modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Comment</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

<script th:src="@{/js/comment.js}"></script>
</body>
</html>
