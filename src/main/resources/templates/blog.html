<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
    <!-- Reuse the Header Fragment on EVERY page -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- If this user is the Owner, have an Add button -->
    <div class="d-flex justify-content-center mb-5 mt-5">
        <button th:if="${isOwner}" class="btn btn-success mb-4" id="add-post-btn">
            Create A Post
        </button>
    </div>

    <!-- Create Post Modal -->
    <div th:if="${isOwner}" id="post-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1050; align-items: center; justify-content: center;">
        <div class="modal-dialog w-100" style="max-width: 500px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Your Post</h5>
                    <button type="button" class="btn-close close-modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="post-form">
                        <div class="mb-3">
                            <label for="post-title" class="form-label">Post Title</label>
                            <input type="text" id="post-title" class="form-control" placeholder="My epic blog" required>
                        </div>
                        <div class="mb-3">
                            <label for="post-content" class="form-label">Post Content</label>
                            <textarea id="post-content" class="form-control" placeholder="I did something cool" required></textarea>
                        </div>
                        <div class="modal-footer border-top-0 px-0 pb-0">
                            <button type="button" class="btn btn-outline-secondary close-modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <h1 class="display-4 text-center mb-5">Blog Name Here</h1>
        <p th:if="${#lists.isEmpty(posts)}" class="text-center">No posts were found.</p>

        <div th:unless="${#lists.isEmpty(posts)}" class="d-flex justify-content-center g-4">
            <div th:each="post : ${posts}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <div class="card-subtitle mb-2 text-muted small">
                            <span th:if="${post.createdAt != null}"
                                  th:text="'Created: ' + ${#temporals.format(post.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>
                        </div>
                        <h5 th:text="${post.title}" class="card-title">Post Title</h5>
                    </div>
                    <div class="card-footer bg-transparent border-top-0 d-flex justify-content-between align-items-center">
                        <div class="card-links">
                        </div>
                        <a th:href="@{/blogs/post/{id}(id=${post.id})}" class="btn btn-primary">View Post</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script th:src="@{/js/post.js}"></script>
</body>
</html>
